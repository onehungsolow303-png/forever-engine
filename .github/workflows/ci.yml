name: ci

# Forever engine CI runs in two layers:
#
#   1. cross-module-http (always): boots Director Hub + Asset Manager and
#      verifies their /health endpoints + a sample /interpret_action and
#      /select call. No Unity needed, no secrets needed, runs every push.
#
#   2. unity (gated): runs the Unity headless compile + EditMode tests +
#      cross-module SmokeTestRunner against the same boot. Skipped unless
#      the UNITY_LICENSE secret is set on the repo (game-ci requires it).
#      To enable: see https://game.ci/docs/github/getting-started for the
#      one-time setup of UNITY_LICENSE / UNITY_EMAIL / UNITY_PASSWORD.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  UNITY_VERSION: "6000.4.1f1"

jobs:
  cross-module-http:
    name: Cross-module HTTP smoke (no Unity)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Forever engine
        uses: actions/checkout@v4
        with:
          path: forever-engine

      - name: Checkout Director Hub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/director-hub
          path: director-hub
        continue-on-error: true
        id: checkout-dh

      - name: Checkout Asset Manager
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/asset-manager
          path: asset-manager
        continue-on-error: true
        id: checkout-am

      - name: Set up Python
        if: steps.checkout-dh.outcome == 'success' && steps.checkout-am.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Director Hub deps
        if: steps.checkout-dh.outcome == 'success'
        working-directory: director-hub
        run: pip install -e ".[dev]"

      - name: Install Asset Manager deps
        if: steps.checkout-am.outcome == 'success'
        working-directory: asset-manager
        run: pip install -e ".[dev]"

      - name: Boot Director Hub in background
        if: steps.checkout-dh.outcome == 'success'
        working-directory: director-hub
        run: |
          nohup uvicorn director_hub.bridge.server:app --port 7802 > /tmp/dh.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:7802/health

      - name: Boot Asset Manager in background
        if: steps.checkout-am.outcome == 'success'
        working-directory: asset-manager
        run: |
          nohup uvicorn asset_manager.bridge.server:app --port 7801 > /tmp/am.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:7801/health

      - name: Smoke /interpret_action
        if: steps.checkout-dh.outcome == 'success'
        run: |
          curl -fsS -X POST http://127.0.0.1:7802/interpret_action \
            -H "Content-Type: application/json" \
            -d '{"schema_version":"1.0.0","session_id":"ci","actor_id":"player","player_input":"smoke","actor_stats":{"hp":20,"max_hp":20}}'

      - name: Smoke /select
        if: steps.checkout-am.outcome == 'success'
        run: |
          curl -fsS -X POST http://127.0.0.1:7801/select \
            -H "Content-Type: application/json" \
            -d '{"schema_version":"1.0.0","kind":"sprite","biome":"forest","tags":["wall"],"allow_ai_generation":false}'

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== Director Hub log ==="
          cat /tmp/dh.log || true
          echo "=== Asset Manager log ==="
          cat /tmp/am.log || true

  unity:
    name: Unity headless compile + EditMode + SmokeTest
    runs-on: ubuntu-latest
    needs: cross-module-http
    # Only run when the UNITY_LICENSE secret is present. game-ci will
    # fail without it, and most contributors won't have it set.
    if: ${{ vars.UNITY_LICENSE_AVAILABLE == 'true' }}

    steps:
      - name: Checkout Forever engine
        uses: actions/checkout@v4
        with:
          path: forever-engine

      - name: Checkout Director Hub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/director-hub
          path: director-hub

      - name: Checkout Asset Manager
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/asset-manager
          path: asset-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Director Hub deps
        working-directory: director-hub
        run: pip install -e ".[dev]"

      - name: Install Asset Manager deps
        working-directory: asset-manager
        run: pip install -e ".[dev]"

      - name: Boot Director Hub in background
        working-directory: director-hub
        run: |
          nohup uvicorn director_hub.bridge.server:app --port 7802 > /tmp/dh.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:7802/health

      - name: Boot Asset Manager in background
        working-directory: asset-manager
        run: |
          nohup uvicorn asset_manager.bridge.server:app --port 7801 > /tmp/am.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:7801/health

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: forever-engine/Library
          key: Library-${{ env.UNITY_VERSION }}-${{ hashFiles('forever-engine/Packages/manifest.json') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-

      - name: Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: forever-engine
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode

      - name: Cross-module SmokeTest (live HTTP from Unity)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: forever-engine
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildMethod: ForeverEngine.Tests.SmokeTestRunner.Run
          customParameters: -quit -batchmode -nographics

      - name: DialoguePanel batchmode smoke test
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: forever-engine
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildMethod: ForeverEngine.Tests.DialogueSmokeTest.Run
          customParameters: -quit -batchmode -nographics

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== Director Hub log ==="
          cat /tmp/dh.log || true
          echo "=== Asset Manager log ==="
          cat /tmp/am.log || true
